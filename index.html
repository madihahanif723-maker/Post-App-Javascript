<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Post App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-3">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="#">Post App</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">

            <!-- FORM -->
            <div class="col-md-4 card p-3 one bord">

                <label>Title</label>
                <input id="title" class="form-control mb-3">

                <label>Description</label>
                <textarea id="description" class="form-control mb-3"></textarea>

                <div class="ms-auto">
                    <button onclick="post()" class="btn btn-pink">Post</button>
                </div>

            </div>

            <!-- POSTS -->
            <div class="col-md-8">
                <div id="posts" class="posts"></div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
